<!DOCTYPE html>
<html lang="ht">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Erè %sveltekit.status% | ST MICHEL</title>
  <style>
    body {
      font-family: ui-sans-serif, system-ui, -apple-system, sans-serif;
      background: #F5F5F5;
      margin: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 1rem;
    }
    .card {
      background: white;
      border-radius: 24px;
      padding: 2rem;
      max-width: 400px;
      width: 100%;
      box-shadow: 0 8px 24px rgba(0,0,0,0.04);
      text-align: center;
    }
    .emoji { font-size: 3rem; margin-bottom: 1rem; }
    h1 { font-size: 2rem; margin: 0 0 0.5rem; }
    p { color: #555; margin: 0 0 1.5rem; }
    a {
      display: inline-block;
      background: #00209F;
      color: white;
      padding: 0.75rem 1.5rem;
      border-radius: 999px;
      text-decoration: none;
      font-weight: 500;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="emoji">⚠️</div>
    <h1>%sveltekit.status%</h1>
    <p>%sveltekit.error.message%</p>
    <a href="/">🏠 Tounen lakay</a>
  </div>
</body>
</html>
